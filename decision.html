<!doctype html><html lang="en-GB"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Treatment preference summary</title><style>:root{--bg:#f6f8fc;--panel:#fff;--text:#172033;--muted:#5d687c;--line:#dce3ee;--accent:#285cff;--soft:#e9efff;--shadow:0 18px 50px rgba(23,32,51,.08)}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#eef3ff 0%,var(--bg) 330px);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);line-height:1.45}.wrap{max-width:1080px;margin:0 auto;padding:28px 18px 90px}.hero{background:rgba(255,255,255,.86);border:1px solid var(--line);border-radius:28px;padding:28px;box-shadow:var(--shadow);margin-bottom:18px}h1{font-size:clamp(2rem,4.6vw,3.5rem);line-height:1;letter-spacing:-.045em;margin:0 0 10px}.lead{margin:0;color:var(--muted);font-size:1.05rem;max-width:850px}.topbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.pill{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px;color:var(--muted);font-size:.92rem;text-decoration:none}.grid{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:18px;align-items:start}.question{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:19px;margin-bottom:14px;box-shadow:0 8px 28px rgba(23,32,51,.045)}.qhead{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}.qnum{flex:0 0 auto;width:34px;height:34px;border-radius:12px;background:var(--soft);color:var(--accent);display:grid;place-items:center;font-weight:900}.qtext{font-weight:850;font-size:1.06rem;letter-spacing:-.015em}.qhint{color:var(--muted);font-size:.92rem;margin-top:3px}.options{display:grid;gap:8px}.option{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff;cursor:pointer}.option:hover{border-color:#9fb4ff;background:#fbfcff}.option input{margin-top:3px;accent-color:var(--accent)}.option.selected{border-color:var(--accent);background:var(--soft)}.summary{position:sticky;top:14px;background:#101827;color:#eef3ff;border-radius:22px;box-shadow:var(--shadow);overflow:hidden;border:1px solid rgba(255,255,255,.12)}.summaryTop{padding:18px;border-bottom:1px solid rgba(255,255,255,.12)}.summaryTop h2{margin:0 0 6px;font-size:1.15rem}.summaryTop p{margin:0;color:#b9c5da;font-size:.92rem}textarea{width:100%;min-height:490px;border:0;resize:vertical;padding:16px;background:#0b1220;color:#f8fbff;font:13px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;outline:none}.buttons{display:flex;gap:8px;padding:12px;background:#101827;border-top:1px solid rgba(255,255,255,.12)}button{border:0;border-radius:12px;padding:11px 13px;font-weight:900;cursor:pointer}.primary{background:#fff;color:#101827;flex:1}.secondary{background:rgba(255,255,255,.1);color:#fff}.status{font-size:.86rem;color:#b9c5da;padding:0 12px 12px;min-height:22px}@media(max-width:900px){.grid{grid-template-columns:1fr}.summary{position:relative;top:auto}textarea{min-height:340px}.wrap{padding-bottom:40px}}</style></head><body><div class="wrap"><section class="hero"><h1>Treatment preference summary</h1><p class="lead">Select the answers that feel closest to you. This does not choose for you. It creates a structured summary of your priorities, concerns and trade-offs.</p><div class="topbar"><span class="pill">12 focused questions</span><span class="pill">No free text</span><span class="pill">Copyable summary</span><a class="pill" href="quizzes.html">Quiz selector</a></div></section><div class="grid"><main id="questions"></main><aside class="summary"><div class="summaryTop"><h2>Copyable summary</h2><p>This updates automatically.</p></div><textarea id="summary" readonly></textarea><div class="buttons"><button class="primary" id="copyBtn" type="button">Copy summary</button><button class="secondary" id="clearBtn" type="button">Clear</button></div><div class="status" id="status"></div></aside></div></div><script>const questions=[{id:'q1',type:'multi',max:2,label:'Main goal',q:'What do you most want treatment to improve?',hint:'Choose up to 2.',options:['Being able to care for my baby more normally.','Reducing pain enough to get through the day.','Reducing reliance on pregabalin or pain medication.','Getting a more lasting improvement.','Feeling less trapped by waiting and uncertainty.']},{id:'q2',type:'single',label:'Baby-care priority',q:'Which statement best describes how your baby affects this decision?',hint:'Choose one.',options:['I need the option that disrupts baby care the least right now.','I need the option most likely to make me physically able to care for my baby.','I could manage a recovery period only if reliable help is arranged.','I am already struggling so much that avoiding recovery is not my only concern.']},{id:'q3',type:'single',label:'Medication priority',q:'How do you feel about needing pregabalin or pain medication to function?',hint:'Choose one.',options:['I can accept it for now if it helps me function.','I can accept it short term, but I do not want it to become normal.','I am worried that without it I cannot do basic tasks.','Reducing medication reliance is one of my main goals.']},{id:'q4',type:'single',label:'Temporary relief',q:'How would you feel if treatment gave relief that might be temporary?',hint:'Choose one.',options:['It would still be valuable if it helped me function now.','It would be acceptable only if there is a clear next step if symptoms return.','It would feel frustrating if I ended up back in the same position.','It would not feel enough if I remained unable to care for my baby or reduce medication.']},{id:'q5',type:'single',label:'Waiting and delay',q:'How do you feel about waiting for appointments or treatment?',hint:'Choose one.',options:['I can wait if pain is controlled enough to function.','I can wait if there is a clear review point and fallback plan.','Waiting feels difficult because my current function is poor.','Waiting feels difficult because I worry the treatment might not work after all that time.','I mainly want the quickest route to meaningful improvement.']},{id:'q6',type:'single',label:'Concern about deterioration while waiting',q:'How much does possible deterioration while waiting affect your decision?',hint:'Choose one.',options:['It is one of my biggest concerns.','I could tolerate waiting if there is a clear way to escalate.','I worry more about staying stuck than about sudden deterioration.','It matters, but my decision is more affected by baby care and recovery.','I am unsure how much this should influence me.']},{id:'q7',type:'multi',max:2,label:'Main concern about injection',q:'What worries you most about trying injection first?',hint:'Choose up to 2.',options:['Waiting for pain clinic and then waiting again for the procedure.','It not working after that wait.','It helping briefly and then wearing off.','Still needing pregabalin or other medication afterwards.','Feeling that surgery was only delayed rather than avoided.']},{id:'q8',type:'multi',max:2,label:'Main concern about surgery',q:'What worries you most about choosing surgery?',hint:'Choose up to 2.',options:['Recovery while caring for a newborn.','Needing help with lifting, bending and baby-care tasks.','Complications, anaesthetic or recovery problems.','Still having pain afterwards.','Regretting not trying the smaller option first.']},{id:'q9',type:'single',label:'Hardest risk trade-off',q:'Which risk feels harder to live with?',hint:'Choose one.',options:['A less invasive route that may take time and not work.','A more invasive route with recovery and surgical risk.','Trying something smaller first but possibly losing time.','Choosing the bigger option and later wondering if it was avoidable.','Both feel difficult for different reasons.']},{id:'q10',type:'multi',max:2,label:'What would make injection acceptable',q:'What would make injection feel acceptable?',hint:'Choose up to 2.',options:['If it can happen soon enough.','If pain is manageable while waiting.','If there is a clear point where success or failure is judged.','If there is a clear next step if it does not work.','If it gives enough relief to care for my baby or reduce medication.']},{id:'q11',type:'multi',max:2,label:'What would make surgery acceptable',q:'What would make surgery feel acceptable?',hint:'Choose up to 2.',options:['If enough help with the baby can be arranged.','If recovery restrictions are realistic for my life.','If my current pain and function feel worse than the fear of recovery.','If it gives a better chance of meaningful improvement or reducing medication.','If I want to avoid repeated waiting, appointments and failed steps.']},{id:'q12',type:'multi',max:3,label:'Top overall priorities',q:'Choose the three statements that matter most to you overall.',hint:'Choose up to 3.',options:['I need to care for my baby more normally.','I want to reduce reliance on pregabalin or pain medication.','I want to avoid surgery if a smaller option could reasonably help.','I do not want a long pathway that may fail.','I am willing to accept recovery if it gives a better chance of real improvement.','I need the least disruption possible right now.','I need a clear fallback if the first plan does not work.','I am more worried about staying like this than about the treatment itself.','I am more worried about treatment risks than about managing longer.','I need the plan to fit life with a newborn.']}];const answers={};const questionsEl=document.getElementById('questions');const summaryEl=document.getElementById('summary');const statusEl=document.getElementById('status');function render(){questionsEl.innerHTML='';questions.forEach((item,idx)=>{answers[item.id]=answers[item.id]||[];const card=document.createElement('section');card.className='question';card.innerHTML=`<div class="qhead"><div class="qnum">${idx+1}</div><div><div class="qtext">${item.q}</div><div class="qhint">${item.hint}</div></div></div>`;const opts=document.createElement('div');opts.className='options';item.options.forEach(text=>{const label=document.createElement('label');label.className='option';const checked=answers[item.id].includes(text);if(checked)label.classList.add('selected');label.innerHTML=`<input type="${item.type==='single'?'radio':'checkbox'}" name="${item.id}" ${checked?'checked':''}><span>${text}</span>`;label.querySelector('input').addEventListener('change',()=>selectAnswer(item,text));opts.appendChild(label)});card.appendChild(opts);questionsEl.appendChild(card)});updateSummary()}function selectAnswer(item,text){const current=answers[item.id]||[];if(item.type==='single'){answers[item.id]=[text]}else if(current.includes(text)){answers[item.id]=current.filter(x=>x!==text)}else{if(item.max&&current.length>=item.max){statusEl.textContent=`Choose up to ${item.max} for this question.`;setTimeout(()=>statusEl.textContent='',1700);return}answers[item.id]=[...current,text]}render()}function updateSummary(){const lines=['Treatment preference summary',''];questions.forEach(q=>{lines.push(`${q.label}:`);const selected=answers[q.id]||[];if(selected.length){selected.forEach(x=>lines.push(`- ${x}`))}else{lines.push('- Not selected')}lines.push('')});summaryEl.value=lines.join('\n').trim()}document.getElementById('copyBtn').addEventListener('click',async()=>{try{await navigator.clipboard.writeText(summaryEl.value);statusEl.textContent='Summary copied.'}catch(e){summaryEl.focus();summaryEl.select();document.execCommand('copy');statusEl.textContent='Summary copied.'}});document.getElementById('clearBtn').addEventListener('click',()=>{Object.keys(answers).forEach(k=>answers[k]=[]);statusEl.textContent='Answers cleared.';render()});render();</script></body></html>
